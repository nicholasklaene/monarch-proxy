name: Publish Docker image to GHCR

# Two trigger paths:
#  - push to main: ship a fresh `:latest` and `:<sha>` on every merge so the
#    install script always pulls a working image.
#  - tag v*.*.*:   pin a versioned image (`:1.2.3`) plus refresh `:latest`.
#
# Uses the built-in GITHUB_TOKEN with packages:write for ghcr.io auth, no PAT
# needed.

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build + push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # tag rules:
          #  - on main: produces `:latest` + `:main` + `:sha-<short>`
          #  - on v*.*.*: produces `:1.2.3`, `:1.2`, `:1`, and `:latest`
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # amd64-only for now: the arm64 layer builds under QEMU emulation, which
          # is slow and memory-heavy and contributed to the Kotlin-compile OOM
          # (CI run 26579517004). amd64 covers the vast majority of Docker hosts and
          # unblocks publish.
          # TODO: re-add arm64 via native runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
