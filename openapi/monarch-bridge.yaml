  # === END FEATURES-AGENT-C ===

components:
  parameters:
    AccountIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Monarch account id.
    AccountIdQuery:
      in: query
      name: accountId
      required: false
      schema:
        type: string
      description: Filter by a single Monarch account id.
    AccountType:
      in: query
      name: accountType
      required: false
      schema:
        type: string
      description: Filter to one Monarch account type (e.g. `brokerage`, `real_estate`).
    CategoryIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Monarch category id.
    GoalIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Monarch savings-goal id.
    EndDate:
      in: query
      name: end
      required: false
      schema:
        type: string
        format: date
      description: Upper bound (inclusive), `YYYY-MM-DD`.
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
      description: Page size.
    MerchantIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Monarch merchant id.
    MoveToCategoryId:
      in: query
      name: moveToCategoryId
      required: false
      schema:
        type: string
      description: Remap any transactions assigned to the deleted category to this one. Omit to leave them uncategorized.
    Offset:
      in: query
      name: offset
      required: false
      schema:
        type: integer
      description: Page offset.
    OrderBy:
      in: query
      name: orderBy
      required: false
      schema:
        type: string
        enum: [date, amount]
      description: Monarch sort enum. Both values sort descending.
    StartDate:
      in: query
      name: start
      required: false
      schema:
        type: string
        format: date
      description: Lower bound (inclusive), `YYYY-MM-DD`.
    Timeframe:
      in: query
      name: timeframe
      required: false
      schema:
        type: string
        default: month
        enum: [day, month, year]
      description: Bucket size for grouped snapshots.
    TransactionIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Monarch transaction id.
    Search:
      in: query
      name: search
      required: false
      schema:
        type: string
      description: Free-text search against merchant / notes / category.
    CategoryIdsQuery:
      in: query
      name: categoryIds
      required: false
      explode: true
      schema:
        type: array
        items:
          type: string
      description: Filter by one or more Monarch category ids. Repeat the query param for each.
    AccountIdsQuery:
      in: query
      name: accountIds
      required: false
      explode: true
      schema:
        type: array
        items:
          type: string
      description: |
        Filter by one or more Monarch account ids. Repeat the query param for each.
        Preferred over the legacy single `accountId` param; both are accepted and merged.
    TagIdsQuery:
      in: query
      name: tagIds
      required: false
      explode: true
      schema:
        type: array
        items:
          type: string
      description: Filter by one or more transaction tag ids. Repeat the query param for each.
    HasAttachments:
      in: query
      name: hasAttachments
      required: false
      schema:
        type: boolean
      description: When set, restrict to transactions that do or do not have attachments. Omit for either.
    HasNotes:
      in: query
      name: hasNotes
      required: false
      schema:
        type: boolean
      description: When set, restrict to transactions that do or do not have notes. Omit for either.
    HideFromReports:
      in: query
      name: hideFromReports
      required: false
      schema:
        type: boolean
      description: When set, restrict to transactions that are or are not hidden from reports. Omit for either.
    IsSplit:
      in: query
      name: isSplit
      required: false
      schema:
        type: boolean
      description: When set, restrict to split or non-split transactions. Omit for either.
    IsRecurring:
      in: query
      name: isRecurring
      required: false
      schema:
        type: boolean
      description: When set, restrict to recurring or non-recurring transactions. Omit for either.
    ImportedFromMint:
      in: query
      name: importedFromMint
      required: false
      schema:
        type: boolean
      description: When set, restrict to transactions imported from Mint or not. Omit for either.
    SyncedFromInstitution:
      in: query
      name: syncedFromInstitution
      required: false
      schema:
        type: boolean
      description: When set, restrict to transactions synced from the institution feed or not. Omit for either.
    NeedsReview:
      in: query
      name: needsReview
      required: false
      schema:
        type: boolean
      description: When set, restrict to transactions that need review or do not. Omit for either.
    TransactionVisibility:
      in: query
      name: transactionVisibility
      required: false
      schema:
        type: string
        enum: [hidden_transactions_only, all_transactions]
      description: |
        Scope of transactions to return. Omit (default) for non-hidden only.
        `hidden_transactions_only` returns only hidden; `all_transactions` returns both.
    PaycheckIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Monarch paycheck id.
    PaycheckEmployerIdPath:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Monarch paycheck-employer id.

  schemas:
    Account:
      type: object
      description: A Monarch account - either Plaid-linked or manually-created.
      required: [id, displayName]
      properties:
        id:
          type: string
          description: Stable Monarch account id.
        displayName:
          type: string
        type:
          type: string
          nullable: true
          description: Top-level account type (e.g. `depository`, `brokerage`, `credit`).
        subtype:
          type: string
          nullable: true
          description: Subtype within the type (e.g. `savings`, `401k`).
        mask:
          type: string
          nullable: true
        currentBalance:
          type: number
          format: double
          nullable: true
          description: Last-known balance in account currency. May be negative for credit/loan.
        displayBalance:
          type: number
          format: double
          nullable: true
        isHidden:
          type: boolean
          description: Monarch's legacy hidden flag.
        hideFromList:
          type: boolean
          description: True if the user has hidden this account from the main list.
        includeInNetWorth:
          type: boolean
        isAsset:
          type: boolean
        isManual:
          type: boolean
          description: True for manually-created (non-Plaid) accounts.
        institution:
          $ref: "#/components/schemas/Institution"
      x-nullable-fields-not-strict: true
    Institution:
      type: object
      description: The financial institution (bank, broker, etc.) backing an account.
      required: [name]
      properties:
        id:
          type: string
          nullable: true
        name:
          type: string
        primaryColor:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        plaidInstitutionId:
          type: string
          nullable: true
    AccountHistoryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [recentTransactions, snapshots]
          properties:
            account:
              allOf:
                - $ref: "#/components/schemas/Account"
              nullable: true
            recentTransactions:
              type: array
              items:
                $ref: "#/components/schemas/Transaction"
            snapshots:
              type: array
              items:
                $ref: "#/components/schemas/AccountSnapshot"
    AccountHoldingsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [holdings]
          properties:
            holdings:
              type: array
              items:
                $ref: "#/components/schemas/Holding"
    AccountSnapshot:
      type: object
      description: One daily balance snapshot.
      required: [date, balance]
      properties:
        date:
          type: string
          format: date
        balance:
          type: number
          format: double
    AccountSyncStatus:
      type: object
      description: Per-account sync flag for `GET /v1/refresh/status`.
      required: [id, hasSyncInProgress]
      properties:
        id:
          type: string
        hasSyncInProgress:
          type: boolean
    GetAccountTypeOptionsResponseData:
      type: object
      required: [accountTypeOptions]
      properties:
        accountTypeOptions:
          type: array
          items:
            $ref: "#/components/schemas/FreeForm"
    GetAccountTypeOptionsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/GetAccountTypeOptionsResponseData"
    AccountTypeReference:
