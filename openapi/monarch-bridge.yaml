    BulkDeleteCategoriesRequest:
      type: object
      description: |
        Body for `POST /v1/categories/bulk-delete`. Each id in `ids` is forwarded to the
        existing single-id delete operation. `moveToCategoryId`, if present, is applied to
        every per-id delete.
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: string
          example: ["c1", "c2", "c3"]
          description: Category ids to delete.
        moveToCategoryId:
          type: string
          nullable: true
          description: Optional remap target applied to each per-id delete.
    BulkDeleteCategoriesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted, failed]
          properties:
            deleted:
              type: array
              items:
                type: string
              description: Ids that were deleted successfully.
            failed:
              type: array
              items:
                $ref: "#/components/schemas/BulkDeleteFailure"
              description: Per-id failures (the bulk endpoint itself still returns 200).
    BulkDeleteFailure:
      type: object
      required: [id, reason]
      properties:
        id:
          type: string
          description: Category id that failed to delete.
        reason:
          type: string
          description: Upstream exception message captured from the per-id delete.
    BulkDeleteTransactionsRequest:
      type: object
      description: |
        Body for `POST /v1/transactions/bulk-delete`. Mirrors Monarch's
        `bulkDeleteTransactions` mutation variables. Two selection modes:

        - **Explicit** (`allSelected: false`, default): `selectedTransactionIds`
          lists exactly which rows to delete.
        - **Filter-based** (`allSelected: true`): every row matching `filters` is
          deleted, minus the optional `excludedTransactionIds` set.

        `expectedAffectedTransactionCount` is required as a safety guard. Pass the
        number of rows you believe will be affected. Monarch rejects the mutation
        if the actual count differs (race-prevention).
      required: [expectedAffectedTransactionCount]
      properties:
        selectedTransactionIds:
          type: array
          items:
            type: string
          description: "Ids to delete (explicit mode). Ignored when `allSelected: true`."
        excludedTransactionIds:
          type: array
          items:
            type: string
          description: "Ids to skip (filter mode). Ignored when `allSelected: false`."
        allSelected:
          type: boolean
          default: false
          description: Switch between explicit (false) and filter (true) selection.
        expectedAffectedTransactionCount:
          type: integer
          description: Safety check. Monarch refuses if actual affected count differs.
        filters:
          $ref: "#/components/schemas/BulkTransactionFilters"
    BulkDeleteTransactionsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [success, affectedCount]
          properties:
            success:
              type: boolean
              description: Monarch's mutation-level success flag.
            affectedCount:
              type: integer
              description: Number of rows Monarch actually deleted.
            errors:
              type: array
              nullable: true
              items:
                $ref: "#/components/schemas/BulkMutationError"
              description: Per-row error messages (typically null on success).
    BulkMutationError:
      type: object
      description: One error entry from a Monarch bulk mutation.
      properties:
        message:
          type: string
          nullable: true
    BulkTransactionFilters:
      type: object
      description: |
        Subset of Monarch's `TransactionFilterInput` accepted by the bulk-transaction
        mutations. Mirrors the read-side filter shape (search + id lists + nullable
        booleans) but is passed through verbatim to Monarch on writes.
      properties:
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        search:
          type: string
          nullable: true
        categories:
          type: array
          items:
            type: string
          nullable: true
        accounts:
          type: array
          items:
            type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        hasAttachments:
          type: boolean
          nullable: true
        hasNotes:
          type: boolean
          nullable: true
        hideFromReports:
          type: boolean
          nullable: true
        isSplit:
          type: boolean
          nullable: true
        isRecurring:
          type: boolean
          nullable: true
        importedFromMint:
          type: boolean
          nullable: true
        syncedFromInstitution:
          type: boolean
          nullable: true
        needsReview:
          type: boolean
          nullable: true
        transactionVisibility:
          type: string
          nullable: true
          enum: [hidden_transactions_only, all_transactions]
    BulkUpdateAccountsRequest:
      type: object
      description: |
