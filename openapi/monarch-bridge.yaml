    # === BEGIN LONGTAIL-SCHEMAS-AGENT-D ===
    LongTailRequest:
      type: object
      description: |
        Generic request body for `/v1/x/*` long-tail endpoints. Pass operation
        variables under `variables`; the proxy forwards them verbatim to Monarch
        as the GraphQL `variables` map. Omit for operations that take no input.
      properties:
        variables:
          type: object
          additionalProperties: true
          description: GraphQL variables map for the wrapped operation.
    LongTailResponse:
      type: object
      required: [data]
      description: |
        Envelope for every `/v1/x/*` long-tail endpoint. `data.result` holds the
        raw Monarch GraphQL `data` payload as a free-form map; clients should not
        pin to deep field paths since upstream shape can change.
      properties:
        data:
          type: object
          required: [result]
          properties:
            result:
              type: object
              additionalProperties: true
              description: Raw Monarch GraphQL `data` payload, untyped.
    # === END LONGTAIL-SCHEMAS-AGENT-D ===
    # === BEGIN MOBILE-SCHEMAS-AGENT-B ===
    MobileScreenAggregateResponse:
      type: object
      required: [data]
      description: |
        Envelope for every `/v1/mobile/*` screen-aggregate endpoint. `data` is the
        raw Monarch GraphQL response tree as a FreeForm map; the proxy does not
        type the deep shape because mobile-bundle aggregates churn per release.
      properties:
        data:
          $ref: '#/components/schemas/FreeForm'
    # === END MOBILE-SCHEMAS-AGENT-B ===
    # === BEGIN WEB-AGGREGATES-AGENT-A ===
    WebScreenAggregateRequest:
      type: object
      description: |
        Body shape for every `/v1/web/*` screen-aggregate endpoint. `variables`
        is forwarded as-is to Monarch's GraphQL endpoint as the operation's
        `variables` map. Omit the body or send `{}` for ops that take no vars.
      properties:
        variables:
          $ref: '#/components/schemas/FreeForm'
    WebScreenAggregateResponse:
      type: object
      required: [data]
      description: |
        Envelope for every `/v1/web/*` screen-aggregate endpoint. `data` is the
        raw Monarch GraphQL response tree as a FreeForm map; the proxy does not
        type the deep shape because web-bundle aggregates churn per release.
      properties:
        data:
          $ref: '#/components/schemas/FreeForm'
    # === END WEB-AGGREGATES-AGENT-A ===
    # === BEGIN FEATURES-SCHEMAS-AGENT-C ===
    FeatureAreaResponse:
      type: object
      required: [data]
      description: |
        Envelope for every `/v1/{advice,forecast,bills,equity-grants,report-configs,
        business-entities}/*` feature-area endpoint. `data` is the raw Monarch
        GraphQL response tree as a FreeForm map; the proxy does not type the deep
        shape because these Monarch surfaces (advice items, forecast scenarios,
        bills, equity grants, report configs, business entities) churn per release
        and are wiring-only here.
      properties:
        data:
          $ref: '#/components/schemas/FreeForm'
    # === END FEATURES-SCHEMAS-AGENT-C ===
