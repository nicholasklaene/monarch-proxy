      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/SubscriptionDetails"
    Goal:
      type: object
      description: A v2 savings goal.
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          nullable: true
          description: One of `savings`, `debt`.
        status:
          type: string
          nullable: true
          description: Lifecycle status (`active`, `complete`, `archived`, etc.).
        progress:
          type: number
          format: double
          nullable: true
          description: 0.0 → 1.0 fraction of `targetAmount` reached.
        currentBalance:
          type: number
          format: double
          nullable: true
        targetAmount:
          type: number
          format: double
          nullable: true
        targetDate:
          type: string
          nullable: true
          description: ISO date the user is aiming for (`YYYY-MM-DD`); nullable for open-ended goals.
        archivedAt:
          type: string
          nullable: true
          description: ISO timestamp the goal was archived; null for active goals.
        createdAt:
          type: string
          nullable: true
        priority:
          type: integer
          nullable: true
          description: User-set ordering (lower = higher priority).
        isSinkingFund:
          type: boolean
          nullable: true
        plannedMonthlyContribution:
          type: number
          format: double
          nullable: true
        estimatedMonthsUntilCompletion:
          type: integer
          nullable: true
        forecastedCompletionDate:
          type: string
          nullable: true
        imageStorageProvider:
          type: string
          nullable: true
        imageStorageProviderId:
          type: string
          nullable: true
    ListGoalsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [goals]
          properties:
            goals:
