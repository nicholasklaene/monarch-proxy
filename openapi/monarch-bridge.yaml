      description: |
        Body for `PATCH /v1/transactions/bulk`. Mirrors Monarch's
        `bulkUpdateTransactions` mutation variables; see
        `BulkDeleteTransactionsRequest` for the selection-mode semantics.

        `updates` is Monarch's `TransactionUpdateParams` shape. Only non-null fields
        are forwarded; pass an empty object to no-op (Monarch will reject if zero
