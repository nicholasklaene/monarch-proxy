openapi: 3.1.0
info:
  title: Monarch Bridge
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: monarch-bridge maintainers
    url: https://github.com/nicholasklaene/monarch-bridge
  description: |
    HTTP/JSON wrapper over Monarch Money's GraphQL API.

    **Contract conventions:**
    - Every successful 2xx body is `{"data": <typed object>}` (except `/healthz`
      and `/v1/auth/{status,refresh}`, which return plain bodies so health probes
      stay zero-parse).
    - Failure bodies, when returned, are `{"code": ..., "message": ..., "details": {...}}`.
    - Mutations whose application layer reports errors come back as `HTTP 422`
      (the proxy walks Monarch's `data.<mutation>.errors[]` and surfaces it).
    - No per-request auth on the wire - the bridge holds Monarch's session token
      itself, loaded once via the interactive bootstrap CLI.

    **Source of truth.** This multi-file YAML tree is hand-curated and
    authoritative. Both request DTOs and response DTOs are generated from it via
    openapi-generator-gradle-plugin into `build/generated/openapi/`, along with
    a Spring `*Api` interface per tag that controllers implement directly. The
    spec drives the web layer end-to-end.

    Full agent reference + every Monarch quirk: see `agents/context/AGENTS.md`.

servers:
  - url: http://localhost:9084
    description: Local proxy (default)

tags:
  - name: System
    description: Health, auth, refresh, subscription, credit history.
  - name: Accounts
    description: Linked + manual account CRUD, history, holdings, networth.
  - name: Transactions
    description: Transaction CRUD, splits, tags, cashflow, summaries.
  - name: Budgets
    description: Monthly + flex bucket budgets, rollover settings.
  - name: Recurring
    description: Upcoming recurring transactions + merchant recurrence rules.
  - name: Categories
    description: Transaction category CRUD + category-groups read.
  - name: Tags
    description: Transaction-tag CRUD.
  - name: Goals
    description: Savings goals (v2) - list, create, contribute, archive.
  - name: Rules
    description: Auto-categorization rules (criteria + actions applied on transaction match).
  - name: Merchants
    description: Merchant search, detail, deletion, and logo updates.
  - name: Paychecks
    description: Paycheck CRUD + per-payday deductions, deposits, and the employer registry.
  - name: Holdings
    description: Manual holdings + manual investments accounts + security catalog search.
  - name: Settings
    description: Read-only household, preferences, members, notifications, budget config.
  - name: Tax
    description: Schedule C / tax-prep aggregates, mappings, and category list.
  - name: TaxLots
    description: Per-holding manual tax-lot cost-basis CRUD and performance history.

  - name: MobileScreens
    description: |
      Mobile screen-aggregate pass-throughs (`Mobile_*` GraphQL ops). FreeForm responses
      - one route per native-app screen aggregate. Shape is volatile; do not pin clients
      to deep field paths.
  - name: WebScreens
    description: |
      Web bundle screen-aggregate pass-throughs (`Web_*` GraphQL ops). FreeForm
      responses - one route per web-app screen aggregate. Shape is volatile
      across Monarch releases; do not pin clients to deep field paths.
  - name: LongTail
    description: |
      Long-tail Monarch GraphQL operations not yet covered by typed resource endpoints.
      Each route under `/v1/x/` runs one upstream operation and returns the raw GraphQL
      `data` payload inside `{"data": {"result": ...}}`. Shape is exactly what Monarch
      returns; do not pin clients to specific deep paths. Use these as escape hatches
      until the operation graduates to a typed resource controller.
  - name: Advice
    description: |
      Monarch's Advice surface - advice items, advice tasks, dashboard widget, and
      onboarding questionnaire. FreeForm pass-throughs of `*Advice*` GraphQL ops;
      shape may churn upstream.
  - name: Forecast
    description: |
      Monarch's Forecast feature - forecast scenarios, scenario events, priority
      rules, account selection, KPIs, onboarding, and user financial profile.
      FreeForm pass-throughs of `Web_*Forecast*` GraphQL ops; shape may churn
      upstream.
  - name: Bills
    description: |
      Monarch's Bills surface - bill detail, bill-split claim/unclaim, split
      participant flows, billing-settings, advisor + employee billing flows, and
      mobile/onboarding postal-code updates. FreeForm pass-throughs of
      `*Bill*`/`*Billing*` GraphQL ops; shape may churn upstream.
  - name: EquityGrants
    description: |
      Monarch's equity-grants feature - list/create/update/delete equity grants
      plus modal-detail queries. FreeForm pass-throughs of `Web_*EquityGrant*`
      GraphQL ops; shape may churn upstream.
  - name: ReportConfig
    description: |
      Monarch's saved-report configurations - list/create/update/delete plus the
      command-palette index. FreeForm pass-throughs of `*ReportConfiguration*`
      GraphQL ops; shape may churn upstream.
  - name: BusinessEntity
    description: |
      Monarch's business-entity surface - detail, upsert, delete, logo delete,
      financials, reports by category/group, and the demo-population flow.
      FreeForm pass-throughs of `*BusinessEntity*` GraphQL ops; shape may churn
      upstream.

