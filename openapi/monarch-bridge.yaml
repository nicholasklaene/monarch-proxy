    MarkAsNotRecurringResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [success]
          properties:
            success:
              type: boolean
    ErrorResponse:
      type: object
      description: |
        Uniform error shape for every non-2xx response. `code` is one of the canonical
        machine-readable values (`invalid_input`, `invalid_param`, `session_missing`,
        `session_expired`, `rate_limited`, `monarch_request_failed`, `payload_error`,
        `not_found`, `internal_error`) OR - when forwarded from a Monarch PayloadError -
        the upstream error code verbatim. Modeled as `string` to keep the forwarded case
        open-ended.
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        message:
          type: string
          description: Human-readable explanation.
        details:
          type: object
          description: Free-form structured detail (field errors, upstream payload error, etc.).
          additionalProperties: true
    FreeForm:
      type: object
      additionalProperties: true
      description: |
        Free-form pass-through from upstream Monarch. Shape is documented per-endpoint;
        treat as a typed `Map<String, Any?>`. Use this for portions of the response we
        intentionally leave untyped because the upstream tree is too deep/volatile to model.
