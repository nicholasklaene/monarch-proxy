        `costBasisPerUnit` express the per-share cost basis at acquisition.
      properties:
        id: { type: string }
        createdAt: { type: string, nullable: true }
        acquisitionDate: { type: string, format: date, nullable: true }
        acquisitionQuantity: { type: number, format: double, nullable: true }
        costBasisPerUnit: { type: number, format: double, nullable: true }

    CreateManualTaxLotRequest:
      type: object
      required: [acquisitionDate, acquisitionQuantity, costBasisPerUnit]
      description: |
        Holding id comes from the URL path. The account id is derived server-side
        from the holding.
      properties:
        accountId:
          type: string
          description: |
            Optional override for the account id. If absent the bridge does not
            forward it (Monarch errors if missing, clients should normally pass it).
        acquisitionDate: { type: string, format: date }
        acquisitionQuantity: { type: number, format: double }
        costBasisPerUnit: { type: number, format: double }
