      required: [expectedAffectedTransactionCount, updates]
      properties:
        selectedTransactionIds:
          type: array
          items:
            type: string
          description: "Ids to patch (explicit mode). Ignored when `allSelected: true`."
        excludedTransactionIds:
          type: array
          items:
            type: string
          description: "Ids to skip (filter mode). Ignored when `allSelected: false`."
        allSelected:
          type: boolean
          default: false
          description: Switch between explicit (false) and filter (true) selection.
        expectedAffectedTransactionCount:
          type: integer
          description: Safety check. Monarch refuses if actual affected count differs.
        updates:
          $ref: "#/components/schemas/BulkTransactionUpdates"
        filters:
          $ref: "#/components/schemas/BulkTransactionFilters"
    BulkTransactionUpdates:
      type: object
      description: |
