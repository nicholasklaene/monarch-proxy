        first-of-month date (`YYYY-MM-DD`); defaults to current month. `applyToFuture`
        cascades the amount to all subsequent months. `accountId` is optional - omit for
        the household-level amount.
      required: [amount]
      properties:
        amount:
          type: number
          format: double
        month:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        applyToFuture:
          type: boolean
          nullable: true
        accountId:
          type: string
          nullable: true
    SetGoalBudgetAmountResponse:
