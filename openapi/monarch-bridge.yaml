    # ---------------------- Transaction Rules ----------------------
    # Auto-categorization rules. Schema mirrors Monarch's TransactionRuleV2
    # field-for-field; almost every leaf is nullable because criteria + actions
    # are independently togglable. Wire types are intentionally close to the
    # GraphQL shape so callers can mirror the web UI's behavior without translation.
    TransactionRuleStringCriterion:
      type: object
      description: One operator-value pair for a text criterion (merchant / original-statement / merchant-name).
      properties:
        operator:
          type: string
          description: Comparison operator (e.g. `equals`, `contains`, `starts_with`, `ends_with`). Forwarded verbatim.
        value:
          type: string
    TransactionRuleAmountRange:
      type: object
      properties:
        lower:
          type: number
          format: double
          nullable: true
        upper:
          type: number
          format: double
          nullable: true
    TransactionRuleAmountCriterion:
      type: object
      description: Match transactions whose signed amount satisfies the operator/value pair.
      properties:
        operator:
          type: string
          description: One of `equals`, `not_equals`, `greater_than`, `less_than`, `between`. Forwarded verbatim.
        isExpense:
          type: boolean
          nullable: true
          description: When true, scope the comparison to expenses (negative amounts) only.
        value:
          type: number
          format: double
          nullable: true
        valueRange:
          allOf:
            - $ref: "#/components/schemas/TransactionRuleAmountRange"
          nullable: true
    TransactionRuleSplitInfo:
      type: object
      description: One entry in `splitTransactionsAction.splitsInfo`. Defines a child split the rule will create on match.
      properties:
        categoryId:
          type: string
          nullable: true
        merchantName:
          type: string
          nullable: true
        amount:
          type: number
          format: double
          nullable: true
          description: Required when amountType is ABSOLUTE; required as a percentage 0-100 when amountType is PERCENTAGE.
        goalId:
          type: string
          nullable: true
        savingsGoalId:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
        hideFromReports:
          type: boolean
          nullable: true
        reviewStatus:
          type: string
          nullable: true
        needsReviewByUserId:
          type: string
          nullable: true
        ownerUserId:
          type: string
          nullable: true
        ownerIsJoint:
          type: boolean
          nullable: true
        businessEntityId:
          type: string
          nullable: true
        businessEntityIsUnassigned:
          type: boolean
          nullable: true
    TransactionRuleSplitAction:
      type: object
      description: Auto-split action. Break the matched transaction into N children by amount or percentage.
      properties:
        amountType:
          type: string
          description: One of `ABSOLUTE`, `PERCENTAGE`. Drives interpretation of each `splitsInfo[].amount`.
        splitsInfo:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRuleSplitInfo"
    TransactionRule:
      type: object
      description: |
        Auto-categorization rule. Every criteria + action field is nullable; only
        the fields the user enabled in the rule builder come back populated.
        `categoryIds`, `accountIds`, `criteriaBusinessEntityIds`, `criteriaOwnerUserIds`
        are inclusion sets (match when the txn belongs to one of these); the
        action fields drive what happens to each matched txn.
      required: [id]
      properties:
        id:
          type: string
        order:
          type: integer
          nullable: true
        merchantCriteriaUseOriginalStatement:
          type: boolean
          nullable: true
        merchantCriteria:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TransactionRuleStringCriterion"
        originalStatementCriteria:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TransactionRuleStringCriterion"
        merchantNameCriteria:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TransactionRuleStringCriterion"
        amountCriteria:
          allOf:
            - $ref: "#/components/schemas/TransactionRuleAmountCriterion"
          nullable: true
        categoryIds:
          type: array
          nullable: true
          items:
            type: string
        accountIds:
          type: array
          nullable: true
          items:
            type: string
        criteriaOwnerIsJoint:
          type: boolean
          nullable: true
        criteriaOwnerUserIds:
          type: array
          nullable: true
          items:
            type: string
        criteriaBusinessEntityIds:
          type: array
          nullable: true
          items:
            type: string
        criteriaBusinessEntityIsUnassigned:
          type: boolean
          nullable: true
        setMerchantAction:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        setCategoryAction:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        addTagsAction:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Ref"
        linkGoalAction:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        linkSavingsGoalAction:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        needsReviewByUserAction:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        unassignNeedsReviewByUserAction:
          type: boolean
          nullable: true
        sendNotificationAction:
          type: boolean
          nullable: true
        setHideFromReportsAction:
          type: boolean
          nullable: true
        setLinkToPaydownBudgetAction:
          type: boolean
          nullable: true
        reviewStatusAction:
          type: string
          nullable: true
        actionSetOwnerIsJoint:
          type: boolean
          nullable: true
        actionSetOwner:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        actionSetBusinessEntity:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        actionSetBusinessEntityIsUnassigned:
          type: boolean
          nullable: true
        recentApplicationCount:
          type: integer
          nullable: true
        lastAppliedAt:
          type: string
          nullable: true
        splitTransactionsAction:
          allOf:
            - $ref: "#/components/schemas/TransactionRuleSplitAction"
          nullable: true
    TransactionRuleRequest:
      type: object
      description: |
        Body for creating / updating / previewing a rule. Every field is optional;
        only the fields you set drive the criteria and actions. Forwarded as-is to
        Monarch's `CreateTransactionRuleInput` / `UpdateTransactionRuleInput` /
        `TransactionRulePreviewInput`. The proxy injects path `{id}` into update
        calls; for create / preview the body alone is sufficient.
      properties:
        merchantCriteriaUseOriginalStatement:
          type: boolean
          nullable: true
        merchantCriteria:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TransactionRuleStringCriterion"
        originalStatementCriteria:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TransactionRuleStringCriterion"
        merchantNameCriteria:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/TransactionRuleStringCriterion"
        amountCriteria:
          allOf:
            - $ref: "#/components/schemas/TransactionRuleAmountCriterion"
          nullable: true
        categoryIds:
          type: array
          nullable: true
          items:
            type: string
        accountIds:
          type: array
          nullable: true
          items:
            type: string
        criteriaOwnerIsJoint:
          type: boolean
          nullable: true
        criteriaOwnerUserIds:
          type: array
          nullable: true
          items:
            type: string
        criteriaBusinessEntityIds:
          type: array
          nullable: true
          items:
            type: string
        criteriaBusinessEntityIsUnassigned:
          type: boolean
          nullable: true
        setMerchantAction:
          type: string
          nullable: true
          description: Merchant id to set on match.
        setCategoryAction:
          type: string
          nullable: true
          description: Category id to set on match.
        addTagsAction:
          type: array
          nullable: true
          items:
            type: string
          description: Tag ids to add on match (additive; does not replace existing tags).
        linkGoalAction:
          type: string
          nullable: true
        linkSavingsGoalAction:
          type: string
          nullable: true
        needsReviewByUserAction:
          type: string
          nullable: true
          description: User id to assign for review.
        unassignNeedsReviewByUserAction:
          type: boolean
          nullable: true
        sendNotificationAction:
          type: boolean
          nullable: true
        setHideFromReportsAction:
          type: boolean
          nullable: true
        setLinkToPaydownBudgetAction:
          type: boolean
          nullable: true
        reviewStatusAction:
          type: string
          nullable: true
        actionSetOwnerIsJoint:
          type: boolean
          nullable: true
        actionSetOwner:
          type: string
          nullable: true
          description: User id to set as transaction owner on match.
        actionSetBusinessEntity:
          type: string
          nullable: true
          description: Business entity id to assign on match.
        actionSetBusinessEntityIsUnassigned:
          type: boolean
          nullable: true
        splitTransactionsAction:
          allOf:
            - $ref: "#/components/schemas/TransactionRuleSplitAction"
          nullable: true
    ListTransactionRulesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [rules]
          properties:
            rules:
              type: array
              items:
                $ref: "#/components/schemas/TransactionRule"
    CreateTransactionRuleResponse:
      type: object
      required: [data]
      description: |
        Monarch's create mutation only returns errors (no rule body). On success
        we surface a `created: true` flag. To inspect the persisted rule, refetch
        the list with `GET /v1/transaction-rules`.
      properties:
        data:
          type: object
          required: [created]
          properties:
            created:
              type: boolean
    UpdateTransactionRuleResponse:
      type: object
      required: [data]
      description: |
        Like create, the update mutation only returns errors. Success means `updated: true`.
      properties:
        data:
          type: object
          required: [updated]
          properties:
            updated:
              type: boolean
    DeleteTransactionRuleResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: boolean
    TransactionRulePreviewMatch:
      type: object
      description: One transaction that would be matched, plus the new values the rule would apply.
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        newName:
          type: string
          nullable: true
        newSplitTransactions:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/FreeForm"
        newCategory:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        newOwnerIsJoint:
          type: boolean
          nullable: true
        newHideFromReports:
          type: boolean
          nullable: true
        newTags:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Ref"
        newGoal:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        newBusinessEntity:
          allOf:
            - $ref: "#/components/schemas/Ref"
          nullable: true
        newBusinessEntityIsUnassigned:
          type: boolean
          nullable: true
    PreviewTransactionRuleResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [totalCount, results]
          properties:
            totalCount:
              type: integer
            results:
              type: array
              items:
                $ref: "#/components/schemas/TransactionRulePreviewMatch"

    # ---------------------- Category-group CRUD ----------------------
    CreateCategoryGroupRequest:
      type: object
      description: |
        Body for `POST /v1/category-groups`. Wraps Monarch's `CreateCategoryGroupInput`.
        `name` and `type` are required. `type` is one of `income`, `expense`, `transfer`.
      required: [name, type]
      properties:
        name:
          type: string
          example: "Investing"
        type:
          type: string
          description: One of `income`, `expense`, `transfer`.
          example: "expense"
        color:
          type: string
          nullable: true
          description: Display color hex (with or without leading `#`).
        icon:
          type: string
          nullable: true
        budgetVariability:
          type: string
          nullable: true
          description: One of `fixed`, `flexible`, `non_monthly`.
        groupLevelBudgetingEnabled:
          type: boolean
          nullable: true
        orderBefore:
          type: string
          nullable: true
          description: UUID of an existing group; the new group is inserted before it. Omit to append at the end.
        rolloverEnabled:
          type: boolean
          nullable: true
        rolloverType:
          type: string
          nullable: true
        rolloverStartMonth:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          nullable: true
          description: ISO date `YYYY-MM-DD` of the first month in the initial rollover window.
        rolloverStartingBalance:
          type: number
          format: double
          nullable: true
    CreateCategoryGroupResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [categoryGroup]
          properties:
            categoryGroup:
              $ref: "#/components/schemas/CategoryGroup"
    UpdateCategoryGroupRequest:
      type: object
      description: |
        Body for `PATCH /v1/category-groups/{id}`. Wraps Monarch's `UpdateCategoryGroupInput`.
        Every field is optional; only non-null fields are forwarded. Path `{id}` is injected
        into the GraphQL `input` automatically.
      properties:
        name:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        budgetVariability:
          type: string
          nullable: true
        groupLevelBudgetingEnabled:
          type: boolean
          nullable: true
        rolloverEnabled:
          type: boolean
          nullable: true
        rolloverType:
          type: string
          nullable: true
        rolloverStartMonth:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          nullable: true
        rolloverStartingBalance:
          type: number
          format: double
          nullable: true
    UpdateCategoryGroupResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [categoryGroup]
          properties:
            categoryGroup:
              $ref: "#/components/schemas/CategoryGroup"
    DeleteCategoryGroupResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: boolean
    UpdateCategoryGroupBudgetVariabilityRequest:
      type: object
      description: |
        Body for `PATCH /v1/category-groups/{id}/budget-variability`. Narrowly scoped
        to flip the fixed-vs-flex classification. Common values: `fixed`, `flexible`,
        `non_monthly`.
      required: [budgetVariability]
      properties:
        budgetVariability:
          type: string
          example: "flexible"
    UpdateCategoryGroupBudgetVariabilityResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [categoryGroup]
          properties:
            categoryGroup:
              $ref: "#/components/schemas/CategoryGroupBudgetVariabilityRef"
    CategoryGroupBudgetVariabilityRef:
      type: object
      description: Minimal response shape for the budget-variability update endpoint.
      required: [id]
      properties:
        id:
          type: string
        budgetVariability:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true

    # ---------------------- Merchants ----------------------
    Merchant:
      type: object
      description: |
        A Monarch merchant. The optional `logoUrl`, `ruleCount`, `canBeDeleted`,
        `hasActiveRecurringStreams`, and `recurringTransactionStream` are populated
        by the detail-read variant (`Common_GetEditMerchant`); the search variants
        only fill `id`, `name`, `transactionCount`, and (with logos) `logoUrl`.
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        transactionCount:
          type: integer
          nullable: true
        ruleCount:
          type: integer
          nullable: true
        canBeDeleted:
          type: boolean
          nullable: true
        hasActiveRecurringStreams:
          type: boolean
          nullable: true
        recurringTransactionStream:
          $ref: "#/components/schemas/MerchantRecurringStream"
    MerchantRecurringStream:
      type: object
      nullable: true
      description: Recurring-transaction stream associated with a merchant; null when none.
      properties:
        id:
          type: string
          nullable: true
        frequency:
          type: string
          nullable: true
        amount:
          type: number
          format: double
          nullable: true
        baseDate:
          type: string
          nullable: true
          description: ISO date `YYYY-MM-DD`.
        isActive:
          type: boolean
          nullable: true
    SearchMerchantsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [merchants]
          properties:
            merchants:
              type: array
              items:
                $ref: "#/components/schemas/Merchant"
    GetMerchantResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [merchant]
          properties:
            merchant:
              $ref: "#/components/schemas/Merchant"
    DeleteMerchantResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: boolean
              description: Monarch's `success` flag, surfaced under the common `deleted` key.
    SetMerchantLogoRequest:
      type: object
      description: |
        Body for `PATCH /v1/merchants/{id}/logo`. Wraps Monarch's `SetMerchantLogoInput`.
        Pass the existing Cloudinary asset's public id; this endpoint does NOT accept
        a binary upload. Send `cloudinaryPublicId: null` to clear the logo.
      properties:
        cloudinaryPublicId:
          type: string
          nullable: true
          description: Cloudinary public id of an already-uploaded image asset. Null clears.
    SetMerchantLogoResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [merchant]
          properties:
            merchant:
              $ref: "#/components/schemas/Merchant"

    # ============================ HOLDINGS ============================
    CreateManualHoldingRequest:
      type: object
      description: |
        Body for `POST /v1/account/{id}/holdings`. `securityId` comes from
        `GET /v1/securities/search`; `quantity` is the number of shares/units.
      required: [securityId, quantity]
      properties:
        securityId:
          type: string
          description: Monarch security id (resolve via securities search).
        quantity:
          type: number
          format: double
          description: Number of shares/units to record.
    CreateManualHoldingResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [holdingId]
          properties:
            holdingId:
              type: string
              description: Id of the newly-created holding.
            ticker:
              type: string
              nullable: true
              description: Echoed back from Monarch when the security has a ticker symbol.
    UpdateHoldingRequest:
      type: object
      description: |
        Body for `PATCH /v1/holdings/{id}`. All fields optional; only non-null fields are
        forwarded to Monarch. Pass `userCostBasis` to override the data-provider basis for
        display purposes (stored separately from any synced basis).
      properties:
        quantity:
          type: number
          format: double
          nullable: true
        securityType:
          type: string
          nullable: true
          description: Monarch security type string (e.g. `equity`, `etf`, `cryptocurrency`).
        userCostBasis:
          type: number
          format: double
          nullable: true
          description: User-provided cost basis. Stored separately from the data-provider value.
    UpdateHoldingResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [holdingId]
          properties:
            holdingId:
              type: string
    DeleteHoldingResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: boolean
    InitialHoldingInput:
      type: object
      description: One seed holding for a new holdings-tracked manual investments account.
      required: [securityId, quantity]
      properties:
        securityId:
          type: string
        quantity:
          type: number
          format: double
    CreateManualInvestmentsAccountRequest:
      type: object
      description: |
        Body for `POST /v1/accounts/manual-investments`. Two tracking methods:

          - `balances` - single account-level balance (set via `initialBalance`).
          - `holdings` - per-security positions (seed via `initialHoldings`).

        `trackingMethod` is optional; if omitted Monarch infers from which seed field is present.
      required: [name, subtype]
      properties:
        name:
          type: string
        subtype:
          type: string
          description: Account subtype string (e.g. `401k`, `ira`, `brokerage`).
        trackingMethod:
          type: string
          nullable: true
          description: One of `balances`, `holdings`. Maps to Monarch's `manualInvestmentsTrackingMethod`.
        initialBalance:
          type: number
          format: double
          nullable: true
          description: Seed balance for balance-tracked accounts.
        initialHoldings:
          type: array
          nullable: true
          description: Seed holdings for holdings-tracked accounts.
          items:
            $ref: "#/components/schemas/InitialHoldingInput"
    CreateManualInvestmentsAccountResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [accountId]
          properties:
            accountId:
              type: string
    Security:
      type: object
      description: A row from Monarch's security catalog. `currentPrice` and friends may be null for thinly-traded or manual securities.
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        ticker:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        typeDisplay:
          type: string
          nullable: true
        logo:
          type: string
          nullable: true
        currentPrice:
          type: number
          format: double
          nullable: true
        closingPrice:
          type: number
          format: double
          nullable: true
        oneDayChangeDollars:
          type: number
          format: double
          nullable: true
        oneDayChangePercent:
          type: number
          format: double
          nullable: true
    SearchSecuritiesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [securities]
          properties:
            securities:
              type: array
              items:
                $ref: "#/components/schemas/Security"
    PaycheckEmployerRef:
      type: object
      description: Minimal employer reference embedded in a paycheck.
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
    PaycheckOwner:
      type: object
      description: The household member who received the paycheck.
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        profilePictureUrl:
          type: string
          nullable: true
    PaycheckCreatedBy:
      type: object
      description: User who entered the paycheck (matters for shared households).
      required: [id]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
    PaycheckDeduction:
      type: object
      description: One line-item deduction from a paycheck (pre-tax, tax, post-tax).
      required: [id, deductionType, amount]
      properties:
        id:
          type: string
        deductionType:
          type: string
          description: |
            Monarch enum of payroll deduction categories (e.g. `federal_income_tax`,
            `traditional_401k`, `medical_insurance`, `custom`). When `custom`, see
            `customDeductionName`.
        customDeductionName:
          type: string
          nullable: true
          description: Free-text label when `deductionType=custom`; null otherwise.
        amount:
          type: number
          format: double
          description: Dollar amount of the deduction (always positive).
        createdAt:
          type: string
          nullable: true
    PaycheckDepositTransactionMerchant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
    PaycheckDepositTransactionAccount:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
          nullable: true
    PaycheckDepositTransaction:
      type: object
      description: The matched bank-side transaction that funded one paycheck deposit.
      required: [id]
      properties:
        id:
          type: string
        amount:
          type: number
          format: double
          nullable: true
        date:
          type: string
          nullable: true
        merchant:
          allOf:
            - $ref: "#/components/schemas/PaycheckDepositTransactionMerchant"
          nullable: true
        account:
          allOf:
            - $ref: "#/components/schemas/PaycheckDepositTransactionAccount"
          nullable: true
    PaycheckDeposit:
      type: object
      description: One credit-side transaction recorded against a paycheck (multi-deposit support).
      required: [id]
      properties:
        id:
          type: string
        transaction:
          allOf:
            - $ref: "#/components/schemas/PaycheckDepositTransaction"
          nullable: true
        createdAt:
          type: string
          nullable: true
    Paycheck:
      type: object
      description: One paycheck - gross amount plus its breakdown of deductions and bank deposits.
      required: [id, grossAmount, payDate]
      properties:
        id:
          type: string
        employer:
          allOf:
            - $ref: "#/components/schemas/PaycheckEmployerRef"
          nullable: true
          description: Reference to the persisted employer; null for legacy paychecks before the registry shipped.
        employerName:
          type: string
          nullable: true
          description: |
            Denormalized employer label. Always present even when `employer` is null
            (Monarch keeps it on the row for historical paychecks).
        payrollProvider:
          type: string
          nullable: true
          description: |
            One of Monarch's `PayrollProvider` enum values (e.g. `adp`, `gusto`,
            `paychex`, `rippling`, `other`). Null for manually-entered paychecks.
        payDate:
          type: string
          description: Day the funds hit the bank, `YYYY-MM-DD`.
        payPeriodStart:
          type: string
          nullable: true
          description: First day of the period this paycheck covers, `YYYY-MM-DD`.
        payPeriodEnd:
          type: string
          nullable: true
          description: Last day of the period this paycheck covers, `YYYY-MM-DD`.
        grossAmount:
          type: number
          format: double
          description: Total gross pay before deductions, in dollars.
        createdAt:
          type: string
          nullable: true
        isMagicImported:
          type: boolean
          nullable: true
          description: True when the paycheck was auto-imported from Monarch's Magic Import.
        owner:
          allOf:
            - $ref: "#/components/schemas/PaycheckOwner"
          nullable: true
        createdBy:
          allOf:
            - $ref: "#/components/schemas/PaycheckCreatedBy"
          nullable: true
        deductions:
          type: array
          items:
            $ref: "#/components/schemas/PaycheckDeduction"
        deposits:
          type: array
          items:
            $ref: "#/components/schemas/PaycheckDeposit"
    PaycheckEmployer:
      type: object
      description: A named employer associated with one or more paychecks.
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        paycheckCount:
          type: integer
          nullable: true
          description: Number of paychecks currently attributed to this employer.
        createdAt:
          type: string
          nullable: true
    PaychecksSummaryDeduction:
      type: object
      description: Aggregated deduction total for one deduction type within the summary window.
      required: [deductionType, totalAmount]
      properties:
        deductionType:
          type: string
        totalAmount:
          type: number
          format: double
    PaychecksSummary:
      type: object
      description: Aggregate paycheck stats over a date window.
      required: [count, totalGross, totalDeductions, totalNet]
      properties:
        count:
          type: integer
          description: Number of paychecks in the window.
        totalGross:
          type: number
          format: double
          description: Sum of `grossAmount` across all paychecks in window.
        totalDeductions:
          type: number
          format: double
        totalNet:
          type: number
          format: double
          description: totalGross minus totalDeductions.
        deductionRate:
          type: number
          format: double
          nullable: true
          description: totalDeductions / totalGross, 0.0 to 1.0.
        deductionsByType:
          type: array
          items:
            $ref: "#/components/schemas/PaychecksSummaryDeduction"
    ListPaychecksResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [paychecks]
          properties:
            paychecks:
              type: array
              items:
                $ref: "#/components/schemas/Paycheck"
    GetPaycheckResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [paycheck]
          properties:
            paycheck:
              $ref: "#/components/schemas/Paycheck"
    GetPaychecksSummaryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [summary]
          properties:
            summary:
              $ref: "#/components/schemas/PaychecksSummary"
    ListPaycheckEmployersResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [employers]
          properties:
            employers:
              type: array
              items:
                $ref: "#/components/schemas/PaycheckEmployer"
            totalCount:
              type: integer
              nullable: true
    PaycheckDeductionInput:
      type: object
      description: One deduction line-item to attach when creating or replacing a paycheck.
      required: [deductionType, amount]
      properties:
        deductionType:
          type: string
          description: |
            Monarch's `PaycheckDeductionType` enum (e.g. `federal_income_tax`, `traditional_401k`,
            `medical_insurance`, `custom`). Use `custom` for free-form labels.
        customDeductionName:
          type: string
          nullable: true
          description: Required when `deductionType=custom`; ignored otherwise.
        amount:
          type: number
          format: double
          description: Dollar amount of the deduction (positive).
    PaycheckDepositInput:
      type: object
      description: One bank-side transaction id to record as a deposit for this paycheck.
      required: [transactionId]
      properties:
        transactionId:
          type: string
    CreatePaycheckRequest:
      type: object
      description: Body for `POST /v1/paychecks`. Maps to Monarch's `CreatePaycheckInput`.
      required: [employerId, grossAmount, payDate]
      properties:
        employerId:
          type: string
          description: Id from `GET /v1/paycheck-employers`. Create one first if you don't have it.
        grossAmount:
          type: number
          format: double
          description: Total gross pay before deductions, in dollars.
        payDate:
          type: string
          description: Day the funds hit the bank, `YYYY-MM-DD`.
        payPeriodStart:
          type: string
          nullable: true
        payPeriodEnd:
          type: string
          nullable: true
        payrollProvider:
          type: string
          nullable: true
          description: One of Monarch's `PayrollProvider` enum values.
        ownerId:
          type: string
          nullable: true
          description: Household member id; omit to default to the calling user.
        deductions:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PaycheckDeductionInput"
        deposits:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PaycheckDepositInput"
    CreatePaycheckResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [paycheck]
          properties:
            paycheck:
              $ref: "#/components/schemas/Paycheck"
    UpdatePaycheckRequest:
      type: object
      description: |
        Body for `PATCH /v1/paychecks/{id}`. All fields optional; only set fields are sent
        to Monarch. Lists (`deductions`, `deposits`) are wholesale-replace when present,
        matching Monarch's `UpdatePaycheckInput` semantics.
      properties:
        employerId:
          type: string
          nullable: true
        grossAmount:
          type: number
          format: double
          nullable: true
        payDate:
          type: string
          nullable: true
        payPeriodStart:
          type: string
          nullable: true
        payPeriodEnd:
          type: string
          nullable: true
        payrollProvider:
          type: string
          nullable: true
        ownerId:
          type: string
          nullable: true
        deductions:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PaycheckDeductionInput"
        deposits:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/PaycheckDepositInput"
    UpdatePaycheckResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [paycheck]
          properties:
            paycheck:
              $ref: "#/components/schemas/Paycheck"
    DeletePaycheckResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [deleted]
          properties:
            deleted:
              type: boolean
    CreatePaycheckEmployerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Acme Inc."
    CreatePaycheckEmployerResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [employer]
          properties:
            employer:
              $ref: "#/components/schemas/PaycheckEmployer"
    UpdatePaycheckEmployerRequest:
      type: object
      required: [name]
