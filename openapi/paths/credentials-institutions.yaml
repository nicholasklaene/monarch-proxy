get:
  tags: [Accounts]
  summary: Linked credentials with their institution metadata
  description: |
    List of credentials with their institutions and the per-credential
    `preferredDataProvider`. Richer than `/v1/credentials` because it
    includes per-provider institution ids (Plaid, Finicity, MX).
  operationId: getCredentialInstitutions
  responses:
    "200":
      description: Credentials with institution metadata.
      content:
        application/json:
          schema:
            $ref: "../monarch-bridge.yaml#/components/schemas/GetCredentialInstitutionsResponse"
