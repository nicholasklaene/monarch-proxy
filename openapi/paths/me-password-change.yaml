post:
  tags: [System]
  summary: Initiate password change
  description: |
    Trigger Monarch's password-change flow. No body required. Monarch
    emails a reset link to the account's verified email; the response
    echoes back the `requestId` + `email` for client-side confirmation.
  operationId: initiatePasswordChange
  responses:
    "200":
      description: Reset-token-issued confirmation.
      content:
        application/json:
          schema:
            $ref: "../monarch-bridge.yaml#/components/schemas/InitiatePasswordChangeResponse"
