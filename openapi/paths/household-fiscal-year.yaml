get:
  tags: [Settings]
  summary: Fiscal year preferences
  description: |
    Household fiscal-year start month + day. Drives "year-to-date" rollups
    in reports for households on a non-calendar fiscal year.
  operationId: getFiscalYear
  responses:
    "200":
      description: Current fiscal-year settings.
      content:
        application/json:
          schema:
            $ref: "../monarch-bridge.yaml#/components/schemas/GetFiscalYearResponse"
put:
  tags: [Settings]
  summary: Update fiscal year preferences
  description: |
    Set the household fiscal-year start. `startMonth` is required (1-12);
    `startDay` is optional (1-31, defaults to 1).
  operationId: setFiscalYear
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../monarch-bridge.yaml#/components/schemas/SetFiscalYearRequest"
  responses:
    "200":
      description: Updated fiscal-year settings.
      content:
        application/json:
          schema:
            $ref: "../monarch-bridge.yaml#/components/schemas/SetFiscalYearResponse"
