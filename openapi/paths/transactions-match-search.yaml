get:
  tags: [Transactions]
  summary: Fuzzy transaction search for "find a match"
  description: |
    Free-text transaction lookup powering the web "find a match" picker
    (used in split, link-to-goal, and recurring-merge flows). Returns a
    lean shape per row: id, amount, date, plaid name, merchant + account
    references.

    Different from the canonical `GET /v1/transactions` in two ways: only
    the `search` filter is supported, and the result shape is the slim
    picker shape rather than the full transaction row.
  operationId: matchSearchTransactions
  parameters:
    - in: query
      name: search
      required: false
      schema:
        type: string
      description: Free-text query against merchant + plaid name.
    - in: query
      name: limit
      required: false
      schema:
        type: integer
        default: 20
      description: Max results.
  responses:
    "200":
      description: Match candidates.
      content:
        application/json:
          schema:
            type: object
            required: [data]
            properties:
              data:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required: [id]
                      properties:
                        id: { type: string }
                        amount: { type: number, format: double, nullable: true }
                        date: { type: string, nullable: true }
                        plaidName: { type: string, nullable: true }
                        merchant:
                          type: object
                          nullable: true
                          properties:
                            id: { type: string, nullable: true }
                            name: { type: string, nullable: true }
                        account:
                          type: object
                          nullable: true
                          properties:
                            id: { type: string, nullable: true }
                            displayName: { type: string, nullable: true }
