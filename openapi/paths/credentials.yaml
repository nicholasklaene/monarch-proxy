get:
  tags: [Accounts]
  summary: List linked credentials
  description: |
    Lightweight list of every linked data-provider credential plus its institution
    (id, name, logo). For richer per-credential settings, use the existing
    institution-settings endpoint instead.
  operationId: listLinkedCredentials
  responses:
    "200":
      description: Linked credentials.
      content:
        application/json:
          schema:
            $ref: "../monarch-bridge.yaml#/components/schemas/ListLinkedCredentialsResponse"
