query Web_TransactionsMessageBlock($ids: [ID!]!) {
    allTransactions(filters: { ids: $ids }) {
      results {
        id
        amount
        merchant {
          id
          name
          logoUrl
        }
        category {
          id
          name
          icon
        }
        tags {
          id
          name
          color
          order
        }
      }
    }
  }
