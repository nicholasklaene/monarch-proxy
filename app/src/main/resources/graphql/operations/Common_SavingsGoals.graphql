query Common_SavingsGoals {
  savingsGoals {
    id
    name
    type
    status
    progress
    currentBalance
    targetAmount
    targetDate
    archivedAt
    createdAt
    priority
    isSinkingFund
    plannedMonthlyContribution
    estimatedMonthsUntilCompletion
    forecastedCompletionDate
    imageStorageProvider
    imageStorageProviderId
    __typename
  }
}
