mutation Web_ReactivateSubscription($input: ReactivateStripeSubscriptionMutationInput!) {
    reactivateStripeSubscription(input: $input) {
      subscription {
        id
        ...SubscriptionFields
      }
      errors {
        message
      }
    }
  }

fragment SubscriptionFields on HouseholdSubscription {
    id
    trialEndsAt
    trialType
    trialDurationDays
    isOnFreeTrial
    canceledPlusTrialAt
    plusTrialEndsAt
    hasChargedForLifetime
    currentPeriodEndsAt
    billingPeriod
    nextPaymentAmount
    hasStripeSubscriptionId
    hasPremiumEntitlement
    entitlements
    eligibleForTrial
    willCancelAtPeriodEnd
    paymentSource
    hasBillingIssue
    isSponsor
    hasHadFreeTrialExtension

    paymentMethod {
      lastFour
      brand
    }

    activePromoCode {
      code
      description
    }

    sponsoredBy {
      name
      email
      profilePictureUrl
    }

    analyticsFreemiumSummaryStatus
    isEligibleForCoreToPlusPromo
  }
