mutation Common_AddTransactionAttachment($input: TransactionAddAttachmentMutationInput!) {
  addTransactionAttachment(input: $input) {
    attachment {
      id
      publicId
      extension
      sizeBytes
      filename
      originalAssetUrl
      __typename
    }
    errors {
      ...PayloadErrorFields
      __typename
    }
    __typename
  }
}
