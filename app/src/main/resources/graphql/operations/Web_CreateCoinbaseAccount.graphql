mutation Web_CreateCoinbaseAccount($input: CreateCoinbaseAccountInput!) {
    createCoinbaseAccount(input: $input) {
      account {
        id
        displayName
      }
      errors {
        ...PayloadErrorFields
      }
    }
  }

fragment PayloadErrorFields on PayloadError {
    fieldErrors {
      field
      messages
    }
    message
    code
  }
