query Web_PreviewAccountDataTransferSnapshots($input: PreviewCopySnapshotsInput!) {
    previewAccountDataTransferSnapshots(input: $input) {
      previewSnapshots {
        date
        signedBalance
      }
      fromAccountSummary {
        numSnapshots
      }
      toAccountSummary {
        numSnapshots
        numNewerSnapshots
      }
    }
  }
