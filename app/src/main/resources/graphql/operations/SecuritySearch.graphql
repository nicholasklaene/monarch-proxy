query SecuritySearch($search: String!, $limit: Int, $orderByPopularity: Boolean) {
  securities(search: $search, limit: $limit, orderByPopularity: $orderByPopularity) {
    id
    name
    type
    logo
    ticker
    typeDisplay
    currentPrice
    closingPrice
    oneDayChangeDollars
    oneDayChangePercent
    __typename
  }
}
