mutation Web_ResetEmployeeAndSubscribe($input: EmployeeSubscriptionInput!) {
    resetEmployeeAndSubscribe(input: $input) {
      subscription {
        id
        isOnFreeTrial
        hasStartedFreeTrial
        entitlements
        billingPeriod
        hasBillingIssue
      }
      errors {
        message
      }
    }
  }
