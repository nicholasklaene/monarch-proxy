mutation Web_UpdateGoalsPriorities($input: UpdateGoalPrioritiesInput!) {
    updateGoalPriorities(input: $input) {
      goals {
        id
        priority
      }
      errors {
        ...PayloadErrorFields
      }
    }
  }

fragment PayloadErrorFields on PayloadError {
    fieldErrors {
      field
      messages
    }
    message
    code
  }
