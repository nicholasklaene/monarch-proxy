query Web_GetPortfolio($portfolioInput: PortfolioInput) {
    portfolio(input: $portfolioInput) {
      performance {
        totalValue
        totalChangePercent
        totalChangeDollars
        oneDayChangePercent
        historicalChart {
          date
          returnPercent
        }
        benchmarks {
          security {
            id
            ticker
            name
            oneDayChangePercent
          }
          historicalChart {
            date
            returnPercent
          }
        }
      }
      aggregateHoldings {
        edges {
          node {
            id
            quantity
            costBasis
            totalValue
            securityPriceChangeDollars
            securityPriceChangePercent
            lastSyncedAt
            holdings {
              id
              type
              typeDisplay
              name
              ticker
              closingPrice
              closingPriceUpdatedAt
              quantity
              value
              costBasis
              userCostBasis
              account {
                id
                mask
                icon
                logoUrl
                institution {
                  id
                  name
                }
                type {
                  name
                  display
                }
                subtype {
                  name
                  display
                }
                displayName
                order
                currentBalance
              }
              taxLots {
                id
                createdAt
                acquisitionDate
                acquisitionQuantity
                costBasisPerUnit
              }
            }
            security {
              id
              name
              ticker
              currentPrice
              currentPriceUpdatedAt
              closingPrice
              type
              typeDisplay
              categoryGroup
            }
          }
        }
      }
    }
  }
