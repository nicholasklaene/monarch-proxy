mutation Web_GiveEmployeeInfinitePremiumAccess {
    giveEmployeeInfinitePremiumAccess {
      subscription {
        id
        entitlements
      }
      errors {
        ...PayloadErrorFields
      }
    }
  }

fragment PayloadErrorFields on PayloadError {
    fieldErrors {
      field
      messages
    }
    message
    code
  }
