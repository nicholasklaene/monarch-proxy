mutation Web_UnmatchRetailTransaction($retailTransactionId: ID!) {
    unmatchRetailTransaction(retailTransactionId: $retailTransactionId) {
      retailSync {
        id
        status
      }
      errors {
        ...PayloadErrorFields
      }
    }
  }

fragment PayloadErrorFields on PayloadError {
    fieldErrors {
      field
      messages
    }
    message
    code
  }
