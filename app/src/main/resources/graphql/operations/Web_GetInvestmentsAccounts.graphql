query Web_GetInvestmentsAccounts {
    accounts(
      filters: {
        accountType: "brokerage"
        includeManual: true
        includeHidden: false
        ignoreHiddenFromNetWorth: true
      }
    ) {
      id
      displayName
      isTaxable
      icon
      order
      logoUrl
      includeInNetWorth
      syncDisabled
      subtype {
        display
      }
    }
  }
