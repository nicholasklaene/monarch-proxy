query Web_GoalsMessageBlock($ids: [ID!]!) {
    goalsV2(ids: $ids) {
      id
      ...Web_GoalDashboardRowFields
    }
  }

fragment Web_GoalDashboardRowFields on GoalV2 {
      id
      name
      imageStorageProvider
      imageStorageProviderId
      currentAmount
      completionPercent
      completedAt
      archivedAt
      type
      accountAllocations {
        id
        currentMonthChange {
          percent
          amount
        }
      }
    }
