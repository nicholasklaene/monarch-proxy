mutation Web_UpdateSubscriptionSponsor($input: UpdateSponsorInput!) {
    updateSubscriptionSponsor(input: $input) {
      sponsor {
        id
        name
      }
      errors {
        ...PayloadErrorFields
      }
    }
  }

fragment PayloadErrorFields on PayloadError {
    fieldErrors {
      field
      messages
    }
    message
    code
  }
