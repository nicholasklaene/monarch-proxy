mutation Common_ContributeToSavingsGoal($input: CreateSavingsGoalContributionInput!) {
  createSavingsGoalContribution(input: $input) {
    userNotice
    goalEvent {
      id
      goal {
        id
        currentBalance
        progress
        status
        __typename
      }
      account {
        id
        availableBalanceForGoalsUnmemoized
        includeInGoalContributions
        __typename
      }
      __typename
    }
    __typename
  }
}
