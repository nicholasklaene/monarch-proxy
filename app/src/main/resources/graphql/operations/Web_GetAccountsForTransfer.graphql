query Web_GetAccountsForTransfer($fromAccountId: UUID!, $toAccountId: UUID!) {
    fromAccount: account(id: $fromAccountId) {
      createdAt
      dataProvider
      ...AccountsListFields
    }
    toAccount: account(id: $toAccountId) {
      createdAt
      dataProvider
      ...AccountsListFields
    }
  }

fragment AccountsListFields on Account {
      id
      syncDisabled
      isHidden
      isAsset
      includeInNetWorth
      order
      type {
        name
        display
      }
      ...AccountListItemFields
    }

fragment AccountListItemFields on Account {
      id
      displayName
      displayBalance
      signedBalance
      updatedAt
      syncDisabled
      dataProviderDeactivatedAt
      icon
      logoUrl
      isHidden
      isAsset
      includeInNetWorth
      includeBalanceInNetWorth
      displayLastUpdatedAt
      limit
      type {
        name
      }
      ...AccountMaskFields
      credential {
        id
        updateRequired
        dataProvider
        disconnectedFromDataProviderAt
        syncDisabledAt
        syncDisabledReason
      }
      connectionStatus {
        connectionStatusCode
        copyTitle
        inAppSmallCopy
        inAppCopy
        helpCenterUrl
      }
      institution {
        id
        ...InstitutionStatusTooltipFields
      }
      ownedByUser {
        id
        displayName
        profilePictureUrl
      }
      businessEntity {
        id
        name
        logoUrl
        color
      }
    }

fragment AccountMaskFields on Account {
    id
    mask
    subtype {
      display
    }
  }

fragment InstitutionStatusTooltipFields on Institution {
    id
    logo
    name
    status
    plaidStatus
    newConnectionsDisabled
    hasIssuesReported
    url
    hasIssuesReportedMessage
    transactionsStatus
    balanceStatus
  }
