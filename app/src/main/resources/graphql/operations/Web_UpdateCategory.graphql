mutation Web_UpdateCategory($input: UpdateCategoryInput!) {
    updateCategory(input: $input) {
      errors {
        ...PayloadErrorFields
      }
      category {
        id
        ...CategoryFormFields
      }
    }
  }

fragment PayloadErrorFields on PayloadError {
    fieldErrors {
      field
      messages
    }
    message
    code
  }

fragment CategoryFormFields on Category {
      id
      order
      name
      icon
      systemCategory
      systemCategoryDisplayName
      budgetVariability
      excludeFromBudget
      isSystemCategory
      isDisabled
      isProtected
      group {
        id
        type
        groupLevelBudgetingEnabled
      }
      rolloverPeriod {
        id
        startMonth
        startingBalance
        type
        frequency
        targetAmount
      }
    }
