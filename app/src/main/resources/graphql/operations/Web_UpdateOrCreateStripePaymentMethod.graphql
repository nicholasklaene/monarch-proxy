mutation Web_UpdateOrCreateStripePaymentMethod(
    $input: UpdateOrCreateStripePaymentMethodMutationInput!
  ) {
    updateOrCreateStripePaymentMethod(input: $input) {
      subscription {
        id
        ...SubscriptionFields
        ...SponsoredSubscriptionFields
        postalCode
      }
      errors {
        message
      }
    }
  }

fragment SubscriptionFields on HouseholdSubscription {
    id
    trialEndsAt
    trialType
    trialDurationDays
    isOnFreeTrial
    canceledPlusTrialAt
    plusTrialEndsAt
    hasChargedForLifetime
    currentPeriodEndsAt
    billingPeriod
    nextPaymentAmount
    hasStripeSubscriptionId
    hasPremiumEntitlement
    entitlements
    eligibleForTrial
    willCancelAtPeriodEnd
    paymentSource
    hasBillingIssue
    isSponsor
    hasHadFreeTrialExtension

    paymentMethod {
      lastFour
      brand
    }

    activePromoCode {
      code
      description
    }

    sponsoredBy {
      name
      email
      profilePictureUrl
    }

    analyticsFreemiumSummaryStatus
    isEligibleForCoreToPlusPromo
  }

fragment SponsoredSubscriptionFields on HouseholdSubscription {
    activeSponsorship {
      id
      sponsor {
        name
        email
        profilePictureUrl
      }
    }
  }
